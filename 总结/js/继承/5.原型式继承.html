<!DOCTYPE html>
<html lang="en">

    <title>Document</title>

  <body>
    <script>
     /*  
      重点： 用一个函数包装一个对象，然后返回这个函数的调用，这个函数就变成了个可以随意增添属性的 实例或对象。object.create()就是这个原理。
      特点： 类似于复制一个对象，用函数来包装。
      缺点： 1、所有实例都会继承原型上的属性。 2、无法实现复用。（新实例属性都是后面添加的） 
      */
      function Parent() {
        this.age = 100;
      }

      function Child(obj) {
        function F() {}
        F.prototype = obj; // 继承了传入的参数
        return new F(); // 返回函数对象
      }
      var ch1 = new Parent(); // 拿到了父类的实例
      var ch2 = Child(ch1);


       /*  function Parent() {
        this.age = 100;
      }

      function child(obj) {
        function F() {}
        F.prototype = obj; //继承了传入的参数
        return new F(); //返回函数对象
      }
      var sup = new Parent();
      //以上是原型式继承，给原型式继承再套个壳子传递参数
      function subObject(obj) {
        var sub = child(obj);
        sub.name = "gar";
        return sub;
      }
      var sup2 = subObject(sup);
      //这个函数经过声明之后就成了可增添属性的对象
      console.log(typeof subObject); //function
      console.log(typeof sup2); //object
      console.log(sup2.name); //"gar"，返回了个sub对象，继承了sub的属性 */
    </script>
  </body>
</html>
