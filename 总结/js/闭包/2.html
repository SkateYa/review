<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
</head>

<body>
  <script>
    // 5 0 1 2 3 4 
    for (var i = 0; i < 5; i++) {
      (function (x) {
        console.log(x++); // 0 1 2 3 4 
      })(i);
    }
    console.log(i); // 5
  </script>
</body>

</html>
