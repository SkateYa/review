// 要传参的话用bind重新套一个，btn.addeventlistener('click',mydebounce)
      var btn = document.querySelector("button");
      let a = 1,
        b = 2,
        c = 3;
      function payMoney( a, b, c) {
        console.log("剁手");
        console.log(this, a, b, c);
      }
      // 防抖
      function debounce(func, delay) {
        let timer;
        return function () {
          let context = this
          let arg = arguments
          console.log('arguments',arguments.target)
          if (timer) clearTimeout(timer);
          timer = setTimeout(() => {
            func.apply(context, arg);
            // console.log('zzzzzzzzz',context, arg )
          }, delay);
        };
      }

      // btn.addEventListener("click", payMoney, 1000);
      btn.addEventListener("click", debounce(payMoney, 1000));
